name: CI/CD — Tests, Build & Push Docker
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── JOB 1 : Lint ─────────────────────────────────
  lint:
    name: 🔍 Lint ESLint + Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Installation des dépendances
        run: npm ci
      - name: Vérification ESLint
        run: npm run lint
      - name: Vérification Prettier
        run: npm run format:check

  # ─── JOB 2 : Tests ────────────────────────────────
  test:
    name: 🧪 Tests — Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 18, 20 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Installation des dépendances
        run: npm ci
      - name: Tests unitaires + couverture
        run: npm run test:ci
      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

  # ─── JOB 3 : Build & Push Docker ──────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login sur GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extraire les métadonnées (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build & Push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 4 : Deploy Staging ───────────────────────
  deploy-staging:
    name: 🚀 Deploy — Staging
    runs-on: ubuntu-latest
    needs: [ docker ]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.RENDER_STAGING_URL }}
    steps:
      - name: Déclencher le déploiement staging
        run: curl -s -X POST '${{ secrets.RENDER_STAGING_HOOK }}'
      - name: Health-check staging (10 tentatives, 15s entre chaque)
        run: |
          for i in {1..10}; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' '${{ vars.RENDER_STAGING_URL }}/health')
            [ "$CODE" = "200" ] && echo "✓ Staging OK" && exit 0
            echo "Tentative $i/10 — code $CODE — attente 15s..." && sleep 15
          done
          echo "✗ Timeout — staging ne répond pas" && exit 1

  # ─── JOB 5 : Deploy Production ────────────────────
  deploy-production:
    name: 🚀 Deploy — Production
    runs-on: ubuntu-latest
    needs: [ deploy-staging ]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.RENDER_PROD_URL }}
    steps:
      - name: Déclencher le déploiement production
        run: curl -s -X POST '${{ secrets.RENDER_PROD_HOOK }}'
      - name: Health-check production (10 tentatives, 15s entre chaque)
        run: |
          for i in {1..10}; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' '${{ vars.RENDER_PROD_URL }}/health')
            [ "$CODE" = "200" ] && echo "✓ Production OK" && exit 0
            echo "Tentative $i/10 — code $CODE — attente 15s..." && sleep 15
          done
          echo "✗ Timeout — production ne répond pas" && exit 1

  # ─── JOB 6 : Résumé final & Notifications ────────
  summary:
    name: 📋 Résumé CI/CD
    runs-on: ubuntu-latest
    needs: [ lint, test, docker, deploy-staging, deploy-production ]
    if: always()
    steps:
      - name: Générer le résumé Step Summary
        run: |
          echo '# CI/CD Pipeline — Résumé' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Étape | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-------|--------|' >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
