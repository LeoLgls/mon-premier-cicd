name: CI Pipeline

# Déclencheurs : s'exécute à chaque push et pull_request sur main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Permet le déclenchement manuel depuis l'UI GitHub

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20] # 2 runs en parallèle !
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test
